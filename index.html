<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Matrícula Escolar</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📚 Sistema de Matrícula Escolar</h1>
                <p>Gerenciar cadastro de alunos</p>
            </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total de Alunos</div>
                <div class="stat-value" id="totalAlunos">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Alunos Cadastrados</div>
                <div class="stat-value" id="alunosCadastrados">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Status</div>
                <div class="stat-value status-ok">✓ Operacional</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls-section">
            <div class="search-box">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="🔍 Buscar por nome ou CPF..."
                    class="search-input"
                >
            </div>
            <button class="btn btn-primary" onclick="abrirFormularioCadastro()">
                ➕ Novo Aluno
            </button>
        </div>

        <!-- Table Section -->
        <div class="table-section">
            <h2>Lista de Alunos</h2>
            <div id="tableContainer" class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>CPF</th>
                            <th>Idade</th>
                            <th>Série</th>
                            <th>Turno</th>
                            <th>Telefone</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaAlunos">
                        <tr class="empty-row">
                            <td colspan="7" class="empty-message">
                                Nenhum aluno cadastrado. Clique em "Novo Aluno" para começar.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Formulário -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Cadastrar Novo Aluno</h2>
                <button class="close-btn" onclick="fecharModal()">&times;</button>
            </div>
            <form id="formularioAluno" onsubmit="salvarAluno(event)">
                <div class="form-group">
                    <label for="nome">Nome *</label>
                    <input type="text" id="nome" required placeholder="Nome completo">
                </div>

                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" required placeholder="11 dígitos" maxlength="11">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="idade">Idade *</label>
                        <input type="number" id="idade" required placeholder="Idade" min="1">
                    </div>

                    <div class="form-group">
                        <label for="serie">Série *</label>
                        <input type="text" id="serie" required placeholder="1º Ano">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="turno">Turno *</label>
                        <select id="turno" required>
                            <option value="">Selecione...</option>
                            <option value="Matutino">Matutino</option>
                            <option value="Vespertino">Vespertino</option>
                            <option value="Noturno">Noturno</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="telefone">Telefone</label>
                        <input type="tel" id="telefone" placeholder="(11) 99999-9999">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <button type="button" class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
